# cocoindex requires Python ≥3.11 (pyproject.toml: requires-python = ">=3.11"
# + Cargo.toml: pyo3 abi3-py311). Override conda-forge-pinning's default
# python_min of 3.10 so the abi3 matrix-collapse pattern (skip: is_abi3 and
# not is_python_min) builds against py3.11. conda-smithy realigns the
# zip-keyed is_python_min flag during rerender to match the new min.
python_min:
  - "3.11"
